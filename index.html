<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bistro | affordable Dining</title>
    <style>
        :root {
            --primary: #1e272e; 
            --accent: #d4a373;  
            --success: #27ae60;
            --danger: #e74c3c;
            --bg-white: #ffffff;
            --light-gray: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #dfe6e9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 800px;
            background: var(--bg-white);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 500px) {
            .phone-container { border-radius: 40px; border: 12px solid #1a1a1a; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        }

        .screen { padding: 25px; flex: 1; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        .hidden { display: none; }

        /* QR Scanner Animation */
        .qr-wrapper {
            margin: 30px auto;
            padding: 20px;
            border: 3px dashed var(--accent);
            border-radius: 20px;
            background: #fff;
            position: relative;
            width: 200px;
            height: 200px;
        }

        .scanner-line {
            width: 100%;
            height: 3px;
            background: var(--danger);
            position: absolute;
            left: 0;
            top: 0;
            box-shadow: 0 0 10px var(--danger);
            animation: scanAnim 2.5s infinite ease-in-out;
            z-index: 10;
        }

        @keyframes scanAnim {
            0% { top: 10px; }
            50% { top: 190px; }
            100% { top: 10px; }
        }

        /* Location Cards */
        .location-card {
            background: var(--light-gray);
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .location-card.selected { border-color: var(--accent); background: #fff; }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--light-gray);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            color: #95a5a6;
        }
        .tab-btn.active { background: var(--primary); color: var(--accent); }

        /* Menu Items */
        .menu-scroll { flex: 1; overflow-y: auto; }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f1f1;
        }
        .item-title { font-weight: 600; font-size: 15px; display: block; }
        .item-price { color: var(--accent); font-weight: 700; font-size: 13px; }

        .qty-box {
            display: flex;
            align-items: center;
            background: var(--light-gray);
            border-radius: 8px;
            padding: 3px;
            gap: 10px;
        }
        .qty-btn { width: 28px; height: 28px; border: none; background: white; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Footer Bar */
        .footer-bar {
            background: var(--primary);
            padding: 20px;
            margin: 0 -25px -25px -25px;
            color: white;
        }
        .btn-action {
            background: var(--accent);
            color: var(--primary);
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
        }

        .receipt { background: white; padding: 20px; border: 1px solid #ddd; font-family: 'Courier New', monospace; font-size: 13px; color: #000; margin-top: 10px;}
    </style>
</head>
<body>

<div class="phone-container">
    
    <div id="page-scan" class="screen">
        <h2 style="margin-top: 20px;">The Bistro</h2>
        <p style="color: #7f8c8d; text-align: center; font-size: 14px;">Scan table QR to start</p>
        
        <div class="qr-wrapper">
            <div class="scanner-line"></div>
            <img src="qrcode.png" alt="QR Code" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        
        <button class="btn-action" style="margin-top: auto;" onclick="navigate('page-location')">Continue</button>
    </div>

    <div id="page-location" class="screen hidden">
        <h2>Verify Location</h2>
        <div class="location-card" onclick="selectLoc(this, 'Main Branch')">
            <span style="font-size: 24px;">📍</span>
            <div><strong>Main Branch</strong><small style="display:block; color:#95a5a6">Dine-in Area</small></div>
        </div>
        <button id="btn-to-menu" class="btn-action" style="margin-top: auto; opacity: 0.5;" disabled onclick="navigate('page-menu')">Yes, I am here</button>
    </div>

    <div id="page-menu" class="screen hidden">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('app')">Starters</button>
            <button class="tab-btn" onclick="switchTab('main')">Meals</button>
            <button class="tab-btn" onclick="switchTab('drink')">Drinks</button>
        </div>

        <div id="tab-app" class="menu-scroll">
            <div class="menu-item">
                <div><span class="item-title">Shanghai (6pcs)</span><span class="item-price">₱99</span></div>
                <div class="qty-box"><button class="qty-btn" onclick="updateQty('Lumpia', 99, -1)">-</button><span id="qty-Lumpia">0</span><button class="qty-btn" onclick="updateQty('Lumpia', 99, 1)">+</button></div>
            </div>
            <div class="menu-item">
                <div><span class="item-title">Cheesy Fries</span><span class="item-price">₱65</span></div>
                <div class="qty-box"><button class="qty-btn" onclick="updateQty('Fries', 65, -1)">-</button><span id="qty-Fries">0</span><button class="qty-btn" onclick="updateQty('Fries', 65, 1)">+</button></div>
            </div>
        </div>

        <div id="tab-main" class="menu-scroll hidden">
            <div class="menu-item">
                <div><span class="item-title">Burger Steak</span><span class="item-price">₱85</span></div>
                <div class="qty-box"><button class="qty-btn" onclick="updateQty('Steak', 85, -1)">-</button><span id="qty-Steak">0</span><button class="qty-btn" onclick="updateQty('Steak', 85, 1)">+</button></div>
            </div>
            <div class="menu-item">
                <div><span class="item-title">Spaghetti</span><span class="item-price">₱65</span></div>
                <div class="qty-box"><button class="qty-btn" onclick="updateQty('Spag', 65, -1)">-</button><span id="qty-Spag">0</span><button class="qty-btn" onclick="updateQty('Spag', 65, 1)">+</button></div>
            </div>
            <div class="menu-item">
                <div><span class="item-title">Pork Chop Rice</span><span class="item-price">₱120</span></div>
                <div class="qty-box"><button class="qty-btn" onclick="updateQty('Pork', 120, -1)">-</button><span id="qty-Pork">0</span><button class="qty-btn" onclick="updateQty('Pork', 120, 1)">+</button></div>
            </div>
        </div>

        <div id="tab-drink" class="menu-scroll hidden">
            <div class="menu-item">
                <div><span class="item-title">Coke 1.5L</span><span class="item-price">₱75</span></div>
                <div class="qty-box"><button class="qty-btn" onclick="updateQty('Coke', 75, -1)">-</button><span id="qty-Coke">0</span><button class="qty-btn" onclick="updateQty('Coke', 75, 1)">+</button></div>
            </div>
            <div class="menu-item">
                <div><span class="item-title">Iced Tea</span><span class="item-price">₱25</span></div>
                <div class="qty-box"><button class="qty-btn" onclick="updateQty('Tea', 25, -1)">-</button><span id="qty-Tea">0</span><button class="qty-btn" onclick="updateQty('Tea', 25, 1)">+</button></div>
            </div>
        </div>

        <div class="footer-bar">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px;"><span>Total</span><strong>₱<span id="total-val">0</span></strong></div>
            <button class="btn-action" onclick="placeOrder()">Place Order</button>
        </div>
    </div>

    <div id="page-receipt" class="screen hidden">
        <h2 style="text-align: center;">Order Confirmed!</h2>
        <div class="receipt" id="receipt-data"></div>
        <button class="btn-action" style="margin-top: 20px;" onclick="location.reload()">New Order</button>
    </div>

</div>

<script>
    let cart = {};
    let prices = { Lumpia: 99, Fries: 65, Steak: 85, Spag: 65, Pork: 120, Coke: 75, Tea: 25 };
    let names = { Lumpia: "Shanghai", Fries: "Cheesy Fries", Steak: "Burger Steak", Spag: "Spaghetti", Pork: "Pork Chop Rice", Coke: "Coke 1.5L", Tea: "Iced Tea" };

    function navigate(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function selectLoc(el, name) {
        document.querySelectorAll('.location-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn-to-menu').disabled = false;
        document.getElementById('btn-to-menu').style.opacity = "1";
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.menu-scroll').forEach(s => s.classList.add('hidden'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
    }

    function updateQty(id, price, delta) {
        if(!cart[id]) cart[id] = 0;
        cart[id] += delta;
        if(cart[id] < 0) cart[id] = 0;
        document.getElementById('qty-' + id).innerText = cart[id];
        let total = 0;
        for(let k in cart) total += cart[k] * prices[k];
        document.getElementById('total-val').innerText = total;
    }

    function placeOrder() {
        let total = 0;
        for(let k in cart) total += cart[k] * prices[k];
        if(total === 0) return alert("Select items!");

        let html = `<strong>THE BISTRO RECEIPT</strong><hr style="border-top:1px dashed #000">`;
        for(let k in cart) {
            if(cart[k] > 0) html += `<div style="display:flex; justify-content:space-between"><span>${cart[k]}x ${names[k]}</span><span>₱${cart[k]*prices[k]}</span></div>`;
        }
        html += `<hr style="border-top:1px dashed #000"><div style="display:flex; justify-content:space-between; font-weight:bold"><span>TOTAL</span><span>₱${total}</span></div>`;
        document.getElementById('receipt-data').innerHTML = html;
        navigate('page-receipt');
    }
</script>

</body>
</html>
